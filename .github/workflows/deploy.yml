name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 데이터 빌드는 로컬에서 실행 후 public/에 커밋한다.
      # CI 재생성 금지: build_1440.py는 무작위 샘플링이라 큐레이션된 슬롯(Step01/02)을 파괴함.
      - name: Deploy public/ to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
