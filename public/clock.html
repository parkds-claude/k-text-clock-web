<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한문장 시계 — 지금 이 시각의 한국 문학</title>
  <meta name="description" content="매 분마다 지금 시각과 어울리는 한국 근대문학 문장을 보여주는 텍스트 시계입니다.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="clock-page">
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">한문장</a>
      <nav class="header-nav">
        <a href="index.html" class="btn-clock">← 문장 탐색</a>
        <button id="theme-toggle" class="btn-theme" aria-label="테마 전환" title="다크/라이트 전환">◐</button>
      </nav>
    </div>
  </header>

  <main class="clock-main">
    <div class="clock-wrap">
      <div id="clock-time" class="clock-time" aria-label="현재 시각"></div>

      <div id="clock-display" class="clock-display" aria-live="polite">
        <p id="clock-text" class="clock-text">불러오는 중…</p>
        <cite id="clock-source" class="clock-source"></cite>
        <p id="clock-match" class="clock-match-badge"></p>
      </div>

      <div class="clock-controls">
        <button id="clock-next" class="btn-next" aria-label="다른 문장 보기">다른 문장 →</button>
        <button id="clock-share" class="btn-share" aria-label="문장 공유">공유</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p><a href="index.html">문장 탐색</a> · 한국 근대문학 명문장 아카이브</p>
      <p class="footer-note">수록 문장 모두 저작자 사후 70년 이상 경과 (Public Domain)</p>
    </div>
  </footer>

  <div id="toast" class="toast" aria-live="polite" role="status"></div>

  <script src="clock.js"></script>
</body>
</html>
