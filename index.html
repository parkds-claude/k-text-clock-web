<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한문장 — 한국 근대문학 명문장 아카이브</title>
  <meta name="description" content="한국 근대문학 속 명문장 7,500건을 작가별·시간대별로 탐색하세요. 모두 저작권 만료(PD) 작품만 수록합니다.">
  <meta property="og:title" content="한문장 — 한국 근대문학 명문장">
  <meta property="og:description" content="이상·김소월·백석·채만식… 한국 문학의 빛나는 문장들을 발견하세요.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">한문장</a>
      <nav class="header-nav">
        <a href="clock.html" class="btn-clock">시계 모드 →</a>
        <button id="theme-toggle" class="btn-theme" aria-label="테마 전환" title="다크/라이트 전환">◐</button>
      </nav>
    </div>
  </header>

  <!-- 오늘의 한 문장 -->
  <section id="hero" aria-label="오늘의 한 문장">
    <p class="hero-label">오늘의 한 문장</p>
    <blockquote id="hero-text">불러오는 중…</blockquote>
    <cite id="hero-source"></cite>
    <div class="hero-meta">
      <span id="hero-timeslot"></span>
      <button id="hero-share" class="btn-share" aria-label="문장 공유">공유</button>
    </div>
  </section>

  <!-- 탐색 영역 -->
  <main>
    <div class="browse-header">
      <h2 class="browse-title" id="browse-heading">탐색</h2>
      <button id="back-btn" class="btn-back hidden" aria-label="목록으로 돌아가기">← 돌아가기</button>
    </div>

    <!-- 탭 -->
    <div class="tabs" role="tablist" aria-label="탐색 방법 선택">
      <button class="tab active" role="tab" aria-selected="true"  data-tab="timeslot">시간대별</button>
      <button class="tab"        role="tab" aria-selected="false" data-tab="author">작가별</button>
      <button class="tab"        role="tab" aria-selected="false" data-tab="all">전체 탐색</button>
    </div>

    <!-- 시간대별 -->
    <div id="tab-timeslot" class="tab-panel" role="tabpanel">
      <div id="timeslot-grid" class="timeslot-grid"></div>
    </div>

    <!-- 작가별 -->
    <div id="tab-author" class="tab-panel hidden" role="tabpanel">
      <div id="author-grid" class="author-grid"></div>
    </div>

    <!-- 전체 탐색 -->
    <div id="tab-all" class="tab-panel hidden" role="tabpanel">
      <div class="search-wrap">
        <input type="search" id="search-input" class="search-input"
               placeholder="문장, 작가, 작품 이름으로 검색…" autocomplete="off">
      </div>
      <p id="result-count" class="result-count"></p>
      <div id="quote-grid" class="quote-grid"></div>
      <button id="load-more" class="btn-load-more hidden">더 보기</button>
    </div>

    <!-- 드릴다운: 필터된 문장 목록 -->
    <div id="tab-filtered" class="tab-panel hidden" role="tabpanel">
      <div id="filtered-grid" class="quote-grid"></div>
      <button id="load-more-filtered" class="btn-load-more hidden">더 보기</button>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p>한국 근대문학 명문장 아카이브 · <a href="clock.html">시계 모드</a></p>
      <p class="footer-note">수록 문장 모두 저작자 사후 70년 이상 경과 (Public Domain)</p>
      <p class="footer-note">데이터: CC BY 4.0 · 코드: MIT</p>
    </div>
  </footer>

  <div id="toast" class="toast" aria-live="polite" role="status"></div>

  <script src="main.js"></script>
</body>
</html>
